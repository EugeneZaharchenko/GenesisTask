services:
  api:
    build: .
    container_name: genesis-release-notifier
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      SCANNER_INTERVAL_MS: ${SCANNER_INTERVAL_MS:-300000}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      API_KEY: ${API_KEY:-}
      DB_PATH: /data/data.db
    volumes:
      - sqlite-data:/data
    restart: unless-stopped

volumes:
  sqlite-data:
